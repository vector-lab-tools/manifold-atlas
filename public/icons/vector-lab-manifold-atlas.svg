<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Manifold Atlas</title>
  <!-- Two overlapping wireframe manifolds (two models, compared) -->
  <g fill="none" stroke-width="1.1" stroke-linecap="round">
    <g stroke="#b8941e" opacity="0.9">
      <ellipse cx="24" cy="32" rx="14" ry="18"/>
      <path d="M 10 32 Q 24 26, 38 32"/>
      <path d="M 10 32 Q 24 38, 38 32"/>
      <path d="M 24 14 Q 18 32, 24 50"/>
    </g>
    <g stroke="#8b3a3a" opacity="0.9">
      <ellipse cx="40" cy="32" rx="14" ry="18"/>
      <path d="M 26 32 Q 40 26, 54 32"/>
      <path d="M 26 32 Q 40 38, 54 32"/>
      <path d="M 40 14 Q 46 32, 40 50"/>
    </g>
  </g>
  <!-- Measurement line between centres -->
  <g stroke="#1a1a1a" stroke-width="0.9" stroke-dasharray="2 2" opacity="0.7">
    <line x1="24" y1="32" x2="40" y2="32"/>
  </g>
  <!-- Centres marked -->
  <circle cx="24" cy="32" r="1.75" fill="#b8941e"/>
  <circle cx="40" cy="32" r="1.75" fill="#8b3a3a"/>
</svg>
